  server:
    image: maltrail/maltrail:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    develop:
      watch:
        - action: rebuild
          path: Dockerfile
        - action: sync+restart
          path: docker/start.sh
          target: /start.sh
    container_name: maltrail-server
    command: server.py
    restart: unless-stopped
    ports:
      - "8338:8338/tcp"
      - "8337:8337/udp"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      # - "/etc/maltrail.conf:/opt/maltrail/maltrail.conf:ro"
      # - "/var/log/maltrail:/var/log/maltrail"

